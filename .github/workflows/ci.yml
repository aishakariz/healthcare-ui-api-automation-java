# ==============================================================
#  Healthcare UI & API Automation - Enterprise CI/CD Pipeline
# ==============================================================
#
#  Author: Aisha |Michael|Aida|Sunisa|Berrat|Pedro
#  Project: healthcare-ui-api-automation-java
#  Tech Stack: Java 17 | JUnit 5 | Maven | Selenium | REST Assured | Allure
#
#  --------------------------------------------------------------
#  Pipeline Overview
#  --------------------------------------------------------------
#  ✔ Build stage (fail fast compilation)
#  ✔ API test stage (smoke on PR, regression on schedule)
#  ✔ UI test stage (parallel execution: Chrome & Firefox)
#  ✔ Retry logic via Maven Surefire
#  ✔ Nightly regression (1 AM Toronto)
#  ✔ Allure report generation & GitHub Pages publishing
#  ✔ Slack notifications (success & failure)
#
#  Trigger Strategy
#  --------------------------------------------------------------
#  - Pull Request  → Smoke tests only
#  - Push to master → API + UI suites
#  - Nightly (cron) → Full regression suite
#
#  Architecture Pattern
#  --------------------------------------------------------------
#  Build → API Tests → UI Tests (Matrix) → Report → Notifications
#
#  This pipeline follows enterprise-grade CI/CD best practices
#  including fail-fast strategy, parallel execution, artifact
#  management, and automated reporting.
#
# ==============================================================
# ==============================================================
#  Healthcare UI & API Automation - Enterprise CI/CD Pipeline
# ==============================================================
# ==============================================================
#  Healthcare UI & API Automation - Enterprise CI/CD Pipeline
# ==============================================================
#  Author: Aisha | Michael | Aida | Sunisa | Berrat | Pedro
#  Tech Stack: Java 17 | JUnit 5 | Maven | Selenium | REST Assured | Allure
# ==============================================================
#  Pipeline Flow:
#  Build → API Tests → UI Tests (Matrix) → Allure Report → Slack
# ==============================================================

name: Healthcare Automation Enterprise CI

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  schedule:
    # Nightly Regression
    # 6:00 AM EST (UTC-5 Winter)
    # 7:00 AM Toronto during EDT (UTC-4 Summer)
    - cron: '0 11 * * *'

env:
  API_BASE_URL: https://demo.openmrs.org/openmrs/ws/rest/v1
  APP_USERNAME: admin
  APP_PASSWORD: Admin123

# ==============================================================
# 1️⃣ BUILD STAGE
# ==============================================================

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile Project
        run: mvn clean compile

  # ==============================================================
  # 2️⃣ API TEST STAGE
  # ==============================================================

  api-tests:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Smoke Tests (PR)
        if: github.event_name == 'pull_request'
        run: mvn test -DincludeTags=smoke

      - name: Run API Tests (Push to Master)
        if: github.event_name == 'push'
        run: mvn test -DincludeTags=api

      - name: Run Full API Regression (Nightly)
        if: github.event_name == 'schedule'
        run: mvn test -DincludeTags=regression

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results

  # ==============================================================
  # 3️⃣ UI TEST STAGE (Parallel Browsers)
  # ==============================================================

  ui-tests:
    needs: api-tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Chrome & Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable firefox

      - name: Run UI Tests
        run: mvn test -DincludeTags=ui -Dbrowser=${{ matrix.browser }}

      - name: Upload UI Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: target/allure-results

  # ==============================================================
  # 4️⃣ ALLURE REPORT GENERATION & DEPLOYMENT
  # ==============================================================

  publish-report:
    needs: ui-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge Allure JSON Files
        run: |
          mkdir -p merged-results

          if [ -d artifacts ]; then
            find artifacts -type f -name "*.json" -exec cp {} merged-results/ \;
          else
            echo "No artifacts directory found. Skipping merge."
          fi

          if [ -z "$(ls -A merged-results 2>/dev/null)" ]; then
            echo "No Allure results found. Skipping report generation."
            exit 0
          fi

      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y allure

      - name: Generate Allure HTML Report
        run: |
          allure generate merged-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          force_orphan: true

  # ==============================================================
  # 5️⃣ SLACK NOTIFICATIONS
  # ==============================================================

  notify-success:
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Slack Success Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ CI Passed - '"${{ github.repository }}"' | Branch: '"${{ github.ref_name }}"'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-failure:
    needs: [api-tests, ui-tests]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Slack Failure Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ CI Failed - '"${{ github.repository }}"' | Branch: '"${{ github.ref_name }}"'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
